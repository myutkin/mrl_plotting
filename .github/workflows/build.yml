name: Build and release executables

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: plot-app-linux.tar.gz
          - os: windows-latest
            archive_name: plot-app-windows.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller main.spec --clean

      - name: Package Linux build
        if: runner.os == 'Linux'
        run: tar -czf plot-app-linux.tar.gz -C dist .

      - name: Package Windows build
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\* -DestinationPath plot-app-windows.zip
        shell: pwsh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: plot-app-${{ runner.os }}
          path: ${{ matrix.archive_name }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
